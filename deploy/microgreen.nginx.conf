# Микрозелень — reverse proxy + раздача статики фронтов.
# Кладётся в /etc/nginx/sites-available/microgreen, симлинк в sites-enabled.
# Блок listen 443 + сертификат добавит certbot --nginx автоматически.
server {
    listen 80;
    server_name microgreen.31.57.250.98.sslip.io;

    # Лендинг — корень.
    root /var/www/microgreen/landing;
    index index.html;

    # Хэшированные ассеты Vite неизменяемы — кэшируем надолго.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Админка на подпути /admin/ (собрана с base=/admin/).
    location /admin/ {
        alias /var/www/microgreen/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # API → backend-контейнер (слушает только localhost). Слеш в конце
    # proxy_pass срезает префикс /api/: /api/auth/login → /auth/login.
    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA-фоллбэк лендинга.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
